apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: install
spec:
  description: |
    Assert that the operator Deployment installed by Helm is up and that the
    CRDs are registered. Targets the athos-system namespace directly because
    Chainsaw runs in its own per-test namespace by default.
  steps:
    - name: assert-operator-deployment
      try:
        - assert:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: athos-kubernetes
                namespace: athos-system
              status:
                (readyReplicas > `0`): true
    - name: assert-crds-installed
      try:
        - assert:
            resource:
              apiVersion: apiextensions.k8s.io/v1
              kind: CustomResourceDefinition
              metadata:
                name: postgresclusters.pg.athos.io
        - assert:
            resource:
              apiVersion: apiextensions.k8s.io/v1
              kind: CustomResourceDefinition
              metadata:
                name: postgresbackups.pg.athos.io
        - assert:
            resource:
              apiVersion: apiextensions.k8s.io/v1
              kind: CustomResourceDefinition
              metadata:
                name: postgresusers.pg.athos.io
