apiVersion: chainsaw.kyverno.io/v1alpha2
kind: Configuration
metadata:
  name: athos-chainsaw
spec:
  # Top-level timeouts. Apply/assert/delete each get their own budget so a
  # slow cluster bring-up does not starve the assertion stage.
  timeouts:
    apply: 60s
    assert: 300s
    error: 300s
    delete: 60s
    cleanup: 60s
    exec: 120s
  # Cleanup configuration: tear the per-test namespace down at the end of
  # every test, no extra delay.
  cleanup:
    delayBeforeCleanup: 0s
