version: "2"
run:
  allow-parallel-runners: true
linters:
  default: none
  enable:
    - errcheck
    - goconst
    - gocyclo
    - godot
    - govet
    - ineffassign
    - misspell
    - nakedret
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
    - whitespace
  settings:
    gocyclo:
      min-complexity: 25
    goconst:
      # Only flag repeated literals that appear fifteen or more times; the
      # default of three churns on common short strings like "name", and a
      # five-occurrence threshold still flags routine domain words such as
      # "postgres", "cluster" and "namespace" inside Postgres-aware helpers.
      min-occurrences: 15
    godot:
      scope: declarations
      period: true
    revive:
      rules:
        - name: comment-spacings
    staticcheck:
      # SA1019 surfaces deprecation notices for upstream APIs. The roadmap
      # tracks those manually; the suppression keeps our lint signal focused
      # on actionable findings.
      checks:
        - all
        - -SA1019
  exclusions:
    generated: lax
    rules:
      - linters:
          - lll
        path: api/.*
      - linters:
          - dupl
          - lll
        path: internal/.*
      # kubebuilder marker comments use //+ without a trailing space; that
      # is intentional and must not be flagged by comment-spacings.
      - linters:
          - revive
        source: ^//\+
      # Test files allow duplicate code and long lines.
      - linters:
          - dupl
          - goconst
          - lll
        path: _test\.go
      # Webhook validators accumulate variable-sized ErrorLists from helper
      # methods. Preallocation does not buy anything here.
      - linters:
          - prealloc
        path: _webhook\.go
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
