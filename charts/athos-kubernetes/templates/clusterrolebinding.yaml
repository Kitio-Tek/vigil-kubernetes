{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "athos.fullname" . }}-manager
  labels:
    {{- include "athos.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "athos.fullname" . }}-manager
subjects:
  - kind: ServiceAccount
    name: {{ include "athos.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
