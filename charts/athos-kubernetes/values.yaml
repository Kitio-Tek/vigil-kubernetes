# Default values for the Vigil PostgreSQL operator.

# replicaCount controls the number of operator manager replicas.
replicaCount: 1

image:
  repository: ghcr.io/kitio-tek/vigil-kubernetes
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a ServiceAccount should be created.
  create: true
  # Annotations to add to the ServiceAccount.
  annotations: {}
  # Name of the ServiceAccount to use. Defaults to the release name.
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true

resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

# leaderElection enables leader election so only one manager is active at a time.
leaderElection:
  enabled: true

# metricsPort is the port on which the operator exposes Prometheus metrics.
metricsPort: 8443

# healthProbePort is the port used for liveness and readiness probes.
healthProbePort: 8081

nodeSelector: {}
tolerations: []
affinity: {}

# crds controls whether the Helm chart installs CRDs.
crds:
  install: true
  keep: true

# rbac controls whether RBAC resources are created.
rbac:
  create: true
