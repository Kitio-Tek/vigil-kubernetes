# permissions for end users to edit postgresbackups.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: vigil
    app.kubernetes.io/managed-by: kustomize
  name: postgresbackup-editor-role
rules:
- apiGroups:
  - pg.vigil.io
  resources:
  - postgresbackups
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - pg.vigil.io
  resources:
  - postgresbackups/status
  verbs:
  - get
