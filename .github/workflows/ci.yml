name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  GO_VERSION: "1.26.3"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Verify gofmt
        run: make verify-fmt

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2

  test:
    name: Unit and Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        # Excludes ./internal/controller (envtest job) and ./test/e2e (KUTTL).
        run: |
          PKGS=$(go list ./... | grep -v 'internal/controller' | grep -v 'test/e2e')
          go test -coverprofile=coverage-unit.out ${PKGS}
        shell: bash

      - name: Install setup-envtest
        run: go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest

      - name: Download envtest binaries
        run: setup-envtest use 1.30.0

      - name: Run controller integration tests
        run: |
          export KUBEBUILDER_ASSETS="$(setup-envtest use 1.30.0 -p path)"
          test -x "${KUBEBUILDER_ASSETS}/etcd" || (echo "etcd missing under ${KUBEBUILDER_ASSETS}"; ls -la "${KUBEBUILDER_ASSETS}"; exit 1)
          go test ./internal/controller/... -coverprofile=coverage-integration.out

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage-*.out

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install controller-gen
        run: GOBIN=$(pwd)/bin go install sigs.k8s.io/controller-tools/cmd/controller-gen@v0.18.0

      - name: Generate and verify
        run: |
          export PATH=$PATH:$(pwd)/bin
          make generate manifests
          git diff --exit-code HEAD || (echo "Generated files are out of date. Run: make generate manifests" && exit 1)

      - name: Build binary
        run: go build -o bin/manager ./cmd/main.go

      - name: Build container image
        run: |
          IMAGE_TAG=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" | tr '[:upper:]' '[:lower:]')
          docker build -t "${IMAGE_TAG}" .

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: athos-kubernetes-e2e

      - name: Install KUTTL
        run: |
          curl -Lo kubectl-kuttl https://github.com/kudobuilder/kuttl/releases/download/v0.15.0/kubectl-kuttl_0.15.0_linux_x86_64
          chmod +x kubectl-kuttl
          sudo mv kubectl-kuttl /usr/local/bin/

      - name: Install Chainsaw
        run: |
          curl -L https://github.com/kyverno/chainsaw/releases/download/v0.2.12/chainsaw_linux_amd64.tar.gz | sudo tar -xz -C /usr/local/bin chainsaw
          chainsaw version

      - name: Build and load operator image
        run: |
          docker build -t ghcr.io/kitio-tek/athos-kubernetes:latest .
          kind load docker-image ghcr.io/kitio-tek/athos-kubernetes:latest --name athos-kubernetes-e2e

      - name: Regenerate manifests
        run: |
          GOBIN=$(pwd)/bin go install sigs.k8s.io/controller-tools/cmd/controller-gen@v0.18.0
          export PATH=$PATH:$(pwd)/bin
          make manifests

      - name: Deploy operator
        # Let Helm own the CRDs so its release labels do not collide with a
        # separately-applied set via kubectl apply.
        run: |
          helm install athos-kubernetes charts/athos-kubernetes/ \
            --namespace athos-system \
            --create-namespace \
            --set image.repository=ghcr.io/kitio-tek/athos-kubernetes \
            --set image.tag=latest \
            --set image.pullPolicy=IfNotPresent \
            --wait --timeout 5m

      - name: Run KUTTL tests
        run: |
          kubectl kuttl test tests/e2e/kuttl/ --config tests/e2e/kuttl/kuttl-test.yaml

      - name: Run Chainsaw tests
        run: |
          chainsaw test \
            --config tests/e2e/chainsaw/.chainsaw.yaml \
            tests/e2e/chainsaw/tests/
