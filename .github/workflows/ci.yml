name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  GO_VERSION: "1.24.2"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.59.1
          args: --timeout 5m

  test:
    name: Unit and Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        run: go test ./internal/postgres/... -v -coverprofile=coverage-unit.out

      - name: Install setup-envtest
        run: |
          go install sigs.k8s.io/controller-runtime/tools/setup-envtest@release-0.18

      - name: Download envtest binaries
        run: |
          setup-envtest use 1.30.0 --bin-dir ./bin

      - name: Run controller integration tests
        run: |
          KUBEBUILDER_ASSETS="$(setup-envtest use 1.30.0 --bin-dir ./bin -p path)" \
            go test ./internal/controller/... -v -coverprofile=coverage-integration.out

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage-*.out

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download controller-gen
        run: |
          GOBIN=$(pwd)/bin go install sigs.k8s.io/controller-tools/cmd/controller-gen@v0.15.0

      - name: Generate code
        run: |
          export PATH=$PATH:$(pwd)/bin
          make generate
          make manifests

      - name: Build binary
        run: go build -o bin/manager ./cmd/main.go

      - name: Build container image
        run: docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: vigil-kubernetes-e2e

      - name: Install KUTTL
        run: |
          curl -Lo kubectl-kuttl https://github.com/kudobuilder/kuttl/releases/download/v0.15.0/kubectl-kuttl_0.15.0_linux_x86_64
          chmod +x kubectl-kuttl
          sudo mv kubectl-kuttl /usr/local/bin/

      - name: Build and load operator image
        run: |
          docker build -t ghcr.io/kitio-tek/vigil-kubernetes:latest .
          kind load docker-image ghcr.io/kitio-tek/vigil-kubernetes:latest --name vigil-kubernetes-e2e

      - name: Install CRDs
        run: |
          GOBIN=$(pwd)/bin go install sigs.k8s.io/controller-tools/cmd/controller-gen@v0.15.0
          export PATH=$PATH:$(pwd)/bin
          make manifests
          kubectl apply -f config/crd/bases/

      - name: Deploy operator
        run: |
          helm install vigil-kubernetes charts/vigil-kubernetes/ \
            --namespace vigil-system \
            --create-namespace \
            --set image.repository=ghcr.io/kitio-tek/vigil-kubernetes \
            --set image.tag=latest

      - name: Run KUTTL tests
        run: |
          kubectl kuttl test tests/e2e/kuttl/ --config tests/e2e/kuttl/kuttl-test.yaml
