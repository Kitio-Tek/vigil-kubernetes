name: Helm Release

# Publishes the Helm chart in charts/athos-kubernetes/ to a chart-museum hosted
# on the gh-pages branch of this repository. Consumers add the repo with:
#
#   helm repo add athos https://kitio-tek.github.io/athos-kubernetes
#
# The workflow runs on every push to main and on every published tag so that
# both the rolling `main` chart and a per-release pinned chart are available.

on:
  push:
    branches: ["main"]
    paths:
      - "charts/**"
      - ".github/workflows/helm-release.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name  "Kitio-Tek"
          git config user.email "kmyriantek@gmail.com"

      - name: Ensure gh-pages branch exists
        run: |
          if ! git ls-remote --exit-code --heads origin gh-pages; then
            echo "Creating gh-pages branch from an empty tree."
            git switch --orphan gh-pages
            cat > index.yaml <<'YAML'
          apiVersion: v1
          entries: {}
          YAML
            cat > README.md <<'MD'
          # Athos Kubernetes Helm chart museum

          This branch is published as a Helm chart repository at:

              helm repo add athos https://kitio-tek.github.io/athos-kubernetes
              helm repo update
              helm search repo athos

          The branch is rewritten by `chart-releaser-action` on every push to
          `main` that touches `charts/**`. Do not commit changes here by hand.
          MD
            git add index.yaml README.md
            git commit -m "chore(gh-pages): bootstrap empty chart museum"
            git push origin gh-pages
            git switch -
          fi

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.6.0
        with:
          charts_dir: charts
          mark_as_latest: true
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_SKIP_EXISTING: "true"
