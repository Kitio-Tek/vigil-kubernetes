name: Helm Release

# Publishes the Helm chart in charts/athos-kubernetes/ to a chart-museum hosted
# on the gh-pages branch of this repository. Consumers add the repo with:
#
#   helm repo add athos https://kitio-tek.github.io/athos-kubernetes
#
# The workflow runs on every push to main and on every published tag so that
# both the rolling `main` chart and a per-release pinned chart are available.

on:
  push:
    branches: ["main"]
    paths:
      - "charts/**"
      - ".github/workflows/helm-release.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name  "Kitio-Tek"
          git config user.email "kmyriantek@gmail.com"

      - name: Ensure gh-pages branch exists
        run: |
          if ! git ls-remote --exit-code --heads origin gh-pages; then
            echo "Creating gh-pages branch from an empty tree."
            current_ref=$(git rev-parse --abbrev-ref HEAD)
            git switch --orphan gh-pages
            cat > index.yaml <<'YAML'
          apiVersion: v1
          entries: {}
          YAML
            cat > README.md <<'MD'
          # Athos Kubernetes Helm chart museum

          This branch is published as a Helm chart repository at:

              helm repo add athos https://kitio-tek.github.io/athos-kubernetes
              helm repo update
              helm search repo athos

          The branch is rewritten by `chart-releaser-action` on every push to
          `main` that touches `charts/**`. Do not commit changes here by hand.
          MD
            git add index.yaml README.md
            git commit -m "chore(gh-pages): bootstrap empty chart museum"
            git push origin gh-pages
            git switch "$current_ref"
          fi

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.6.0
        with:
          charts_dir: charts
          mark_as_latest: false
          # Keep operator release names like v0.8.0 separate from the
          # auto-generated chart releases. Chart releases are prefixed with
          # "helm-v" so they do not displace the operator's Latest pointer
          # nor reuse the v-prefixed tag namespace.
          config: cr.yaml
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_SKIP_EXISTING: "true"
          CR_MAKE_RELEASE_LATEST: "false"

      - name: Demote chart release out of Latest
        # chart-releaser cannot tag the release as a pre-release directly,
        # so we flip the flag after the fact via the GitHub API. This keeps
        # operator releases (v0.x.y) as the user-facing Latest entry.
        run: |
          chart_version=$(yq '.version' charts/athos-kubernetes/Chart.yaml)
          release="helm-v${chart_version}"
          if gh release view "$release" >/dev/null 2>&1; then
            gh release edit "$release" --prerelease
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
